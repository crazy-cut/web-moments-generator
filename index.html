<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朋友圈排版工具</title>
<style>
:root{--bg:#eef3ee;--panel:#ffffffd9;--line:#dfe8e1;--text:#223028;--muted:#6d7b72;--brand:#1f9d62}
*{box-sizing:border-box;margin:0;padding:0} html,body{height:100%} body{overflow:hidden;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f3f7f3,#e8f0ea);color:var(--text)}
.layout{display:flex;height:100vh;overflow:hidden}.preview{flex:1;display:flex;align-items:center;justify-content:center;padding:36px;overflow:hidden}.editor{display:flex;flex-direction:column;width:360px;height:100vh;border-left:1px solid var(--line);background:var(--panel);overflow:hidden}.editor-scroll{flex:1;padding:20px 20px 12px;overflow-y:auto;overflow-x:hidden}.editor-actions{padding:14px 20px 20px;border-top:1px solid rgba(223,232,225,.9);background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.96));backdrop-filter:blur(12px)}
.stage{padding:28px;border-radius:36px;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(246,249,246,.72));box-shadow:0 26px 60px rgba(15,35,22,.14)}
.phone{position:relative;width:395px;height:852px;overflow:auto;border:8px solid #111917;border-radius:44px;background:#fff;box-shadow:0 28px 70px rgba(8,24,14,.24);scrollbar-width:none}.phone::-webkit-scrollbar{display:none}
.status,.nav{position:absolute;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;color:#fff;z-index:4}.status{top:0;height:50px;padding:0 24px;font-weight:700;font-size:15px;letter-spacing:.02em}.nav{top:56px;height:44px;padding:0 18px}
.nav-icon{display:flex;align-items:center;justify-content:center;width:34px;height:34px;color:#fff}
.header{position:relative;margin-bottom:54px}.cover{position:relative;width:100%;height:398px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(135deg,#7b8f77 0%,#a89074 42%,#c9b18f 100%)}.cover img{display:block;width:100%;height:100%;object-fit:cover}.cover::after{content:"";position:absolute;inset:auto 0 0 0;height:104px;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.42) 100%)}.user{position:absolute;right:18px;bottom:-34px;display:flex;align-items:flex-end}.name{position:absolute;right:98px;bottom:46px;display:block;max-width:180px;color:#fff;font-size:18px;font-weight:700;line-height:1.2;white-space:nowrap;writing-mode:horizontal-tb;text-orientation:mixed;text-shadow:0 4px 16px rgba(0,0,0,.45);z-index:2}.me{width:78px;height:78px;border-radius:18px;border:4px solid rgba(255,255,255,.98);background:#eee;box-shadow:0 8px 20px rgba(0,0,0,.16);overflow:hidden}.me img{display:block;width:100%;height:100%;object-fit:cover}
.list{padding:38px 0 18px}.post{display:flex;padding:0 18px 22px;margin-bottom:24px;border-bottom:1px solid #f1f3f1}.post:last-child{border-bottom:none}.avatar{width:44px;height:44px;margin-right:12px;border-radius:12px;background:#eee;flex-shrink:0;overflow:hidden}.avatar img{display:block;width:100%;height:100%;object-fit:cover}.content{flex:1}.pname{color:#576b95;font-size:16px;font-weight:700;margin-bottom:4px}.text{font-size:15px;line-height:1.75;white-space:pre-wrap;word-break:break-word;margin-bottom:12px}.images{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}.images img{width:82px;height:82px;object-fit:cover;border-radius:8px;background:#f0f0f0}.images[data-count="1"] img{width:auto;height:auto;max-width:184px;max-height:240px;border-radius:10px;object-fit:contain}.footer{display:flex;justify-content:space-between;align-items:center;height:24px;margin-bottom:10px}.time{font-size:12px;color:#b7b7b7}.more{width:36px;height:24px;border-radius:12px;border:1px solid #e6ebea;background:#f8fbfa;display:flex;justify-content:center;align-items:center;gap:3px}.more span{width:4px;height:4px;border-radius:50%;background:#6179a8}
.box{margin-top:5px;padding:8px 10px;border-radius:12px;background:#f5f8f5;font-size:14px}.box .like{color:#576b95;font-weight:700}.comment{margin-top:4px}.panel{margin-bottom:16px;padding:16px;border:1px solid var(--line);border-radius:18px;background:#fff}.panel h3{font-size:16px;margin-bottom:12px}.group{margin-bottom:12px}.group label{display:block;margin-bottom:6px;font-size:13px;color:var(--muted);font-weight:600}.group input,.group textarea,.group select{width:100%;padding:10px 12px;border:1px solid #dce5de;border-radius:12px;font:inherit}.group textarea{min-height:90px;resize:vertical}
button{width:100%;padding:11px 14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--brand),#2ab272);color:#fff;font:inherit;font-weight:700;cursor:pointer}button.alt{background:#fff;color:#176b44;border:1px solid #cae5d6}button.danger{background:linear-gradient(135deg,#ff6c70,#ff5a62)}button.sm{padding:8px 10px}.row{display:flex;gap:6px}.note{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}.edit-post{margin-bottom:14px;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fbfdfb}.comments-row{display:flex;gap:6px;margin-bottom:6px}.comments-row input{padding:8px 10px}.comments-row .u{width:30%}.comments-row .c{width:50%}.comments-row .rm{width:auto;padding:8px 10px;border:1px solid #ffd6d7;border-radius:10px;background:#fff;color:#ff4d4f}input[type=file]{display:none!important}
@media (max-width:1100px){body{overflow:auto}.layout{flex-direction:column;height:auto;overflow:visible}.preview{min-height:60vh;overflow:visible}.editor{width:100%;height:auto;border-left:none;border-top:1px solid var(--line)}.editor-scroll{overflow:visible;padding:20px 20px 12px}.editor-actions{padding:14px 20px 20px}}
</style>
</head>
<body>
<div class="layout">
  <div class="preview"><div class="stage"><div class="phone" id="phone"><div class="status"><div>13:25</div><div>4G</div></div><div class="nav"><div class="nav-icon" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></div><div class="nav-icon" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M4 8C4 6.89543 4.89543 6 6 6H8L9.6 4H14.4L16 6H18C19.1046 6 20 6.89543 20 8V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V8Z"></path><circle cx="12" cy="13" r="3.1" fill="#2f3431"></circle></svg></div></div><div class="header"><div class="cover" id="cover"><img id="cover-img" src="logo.png" alt=""></div><div class="user"><div class="name" id="my-name-view">你的昵称</div><div class="me" id="my-avatar"><img id="my-avatar-img" src="" alt=""></div></div></div><div class="list" id="moments-list"></div></div></div></div>
  <div class="editor">
    <div class="editor-scroll">
      <div class="panel"><h3>个人信息</h3><div class="group"><label for="my-name-input">昵称</label><input id="my-name-input" value="你的昵称"></div><div class="group"><label>头像</label><button class="alt" type="button" onclick="pickFile('my-avatar-file')">更换头像</button><input type="file" id="my-avatar-file" accept="image/*"></div><div class="group"><label>背景图</label><button class="alt" type="button" onclick="pickFile('cover-file')">更换背景</button><input type="file" id="cover-file" accept="image/*"></div></div>
      <div class="panel"><h3>动态管理</h3><div id="editor-posts"></div><button id="add-post" type="button">新增一条动态</button></div>
    </div>
    <div class="editor-actions">
      <button id="shot-btn" type="button" onclick="takeScreenshot()" style="background:linear-gradient(135deg,#2585ff,#2aa7ff)">生成高清长截图</button>
    </div>
  </div>
</div>
<template id="post-editor-template">
  <div class="edit-post">
    <div class="group"><label>发布者昵称</label><input class="post-name-input"></div>
    <div class="group"><label>发布者头像</label><button class="alt sm post-avatar-btn" type="button">更换头像</button><input type="file" class="post-avatar-file" accept="image/*"></div>
    <div class="group"><label>正文内容</label><textarea class="post-text-input"></textarea></div>
    <div class="group"><label>图片（1-9张）</label><div class="row"><button class="alt sm post-images-btn" type="button" style="flex:1">选择图片</button><button class="alt sm post-images-clear" type="button" style="flex:1;border-color:#ffbabc;color:#d94a52">清空图片</button></div><input type="file" class="post-images-file" accept="image/*" multiple><div class="note post-images-count"></div></div>
    <div class="group"><label>发布时间</label><input class="post-time-input"></div>
    <div class="group"><label>点赞</label><select class="post-likes-switch"><option value="no">关闭</option><option value="yes">开启</option></select><div class="group post-likes-wrap" style="display:none;margin-top:6px"><input class="post-likes-input" placeholder="输入昵称，用逗号分隔"></div></div>
    <div class="group"><label>评论区</label><div class="post-comments"></div><button class="alt sm post-add-comment" type="button">添加评论</button></div>
    <button class="danger post-delete" type="button">删除这条动态</button>
  </div>
</template>
<script src="html2canvas.min.js"></script>
<script>
const DEFAULT_AVATAR='我的头像.png';
const DEFAULT_COVER='默认背景图.JPG';
const SCALE=Math.min(4,Math.max(3,window.devicePixelRatio||1));
let posts=[
{id:1,name:'路人甲',avatar:DEFAULT_AVATAR,text:'这是一条带图片的动态，支持直接调整昵称、文案、配图和评论。',images:[DEFAULT_AVATAR],time:'20分钟前',likes:[],comments:[]},
{id:2,name:'路人乙',avatar:DEFAULT_AVATAR,text:'这是一条纯文本动态。没有上传配图时，会以纯文本排版展示。',images:[],time:'45分钟前',likes:['张三','李四'],comments:[{user:'王五',content:'现在这样就清爽很多。'}]}
];
const momentsList=document.getElementById('moments-list');
const editorPosts=document.getElementById('editor-posts');
const tpl=document.getElementById('post-editor-template');
const shotBtn=document.getElementById('shot-btn');
const myAvatarImg=document.getElementById('my-avatar-img');
let defaultAvatarThumb='';
function setCover(src){const img=document.getElementById('cover-img'); img.src=src||''; img.style.display=src?'block':'none';}
function setImg(img,src){img.src=src||''; img.style.display=src?'block':'none';}
function readFile(file){return new Promise((resolve,reject)=>{const r=new FileReader(); r.onload=e=>resolve(e.target.result); r.onerror=()=>reject(new Error(`读取文件失败：${file.name}`)); r.readAsDataURL(file);});}
function loadImage(src){return new Promise((resolve,reject)=>{const img=new Image(); img.onload=()=>resolve(img); img.onerror=()=>reject(new Error('图片加载失败')); img.src=src;});}
async function makeSquareAvatar(src,size=512){const img=await loadImage(src); const side=Math.min(img.naturalWidth||img.width,img.naturalHeight||img.height); const sx=((img.naturalWidth||img.width)-side)/2; const sy=((img.naturalHeight||img.height)-side)/2; const canvas=document.createElement('canvas'); canvas.width=size; canvas.height=size; const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'; ctx.drawImage(img,sx,sy,side,side,0,0,size,size); return canvas.toDataURL('image/png');}
async function makeSquareCover(src,size=900){const img=await loadImage(src); const side=Math.min(img.naturalWidth||img.width,img.naturalHeight||img.height); const sx=((img.naturalWidth||img.width)-side)/2; const sy=((img.naturalHeight||img.height)-side)/2; const canvas=document.createElement('canvas'); canvas.width=size; canvas.height=size; const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'; ctx.drawImage(img,sx,sy,side,side,0,0,size,size); return canvas.toDataURL('image/jpeg',0.95);}
function pickFile(id){document.getElementById(id).click();}
function moreIcon(){const d=document.createElement('div'); d.className='more'; d.innerHTML='<span></span><span></span>'; return d;}
function renderPreview(){momentsList.innerHTML=''; posts.forEach(post=>{const item=document.createElement('div'); item.className='post'; const avatar=document.createElement('div'); avatar.className='avatar'; const avatarImg=document.createElement('img'); avatarImg.src=post.avatar||''; avatarImg.alt=''; avatar.appendChild(avatarImg); const content=document.createElement('div'); content.className='content'; const name=document.createElement('div'); name.className='pname'; name.textContent=post.name; const text=document.createElement('div'); text.className='text'; text.textContent=post.text; content.append(name,text); if(post.images.length){const images=document.createElement('div'); images.className='images'; images.dataset.count=String(post.images.length); post.images.forEach((src,i)=>{const img=document.createElement('img'); img.src=src; img.alt=`配图 ${i+1}`; images.appendChild(img);}); content.appendChild(images);} const footer=document.createElement('div'); footer.className='footer'; const time=document.createElement('div'); time.className='time'; time.textContent=post.time; footer.append(time,moreIcon()); content.appendChild(footer); if(post.likes.length||post.comments.length){const box=document.createElement('div'); box.className='box'; if(post.likes.length){const likes=document.createElement('div'); likes.innerHTML='<span class="like">'+post.likes.join(', ')+'</span>'; box.appendChild(likes);} post.comments.forEach(c=>{const row=document.createElement('div'); row.className='comment'; const u=document.createElement('span'); u.className='like'; u.textContent=`${c.user}:`; const t=document.createElement('span'); t.textContent=` ${c.content}`; row.append(u,t); box.appendChild(row);}); content.appendChild(box);} item.append(avatar,content); momentsList.appendChild(item);});}
function commentRow(post,index){const c=post.comments[index]; const row=document.createElement('div'); row.className='comments-row'; const u=document.createElement('input'); u.className='u'; u.value=c.user; u.placeholder='评论人'; u.oninput=e=>{post.comments[index].user=e.target.value; renderPreview();}; const t=document.createElement('input'); t.className='c'; t.value=c.content; t.placeholder='内容'; t.oninput=e=>{post.comments[index].content=e.target.value; renderPreview();}; const b=document.createElement('button'); b.type='button'; b.className='rm'; b.textContent='删除'; b.onclick=()=>{post.comments.splice(index,1); render();}; row.append(u,t,b); return row;}
function renderEditor(){editorPosts.innerHTML=''; posts.forEach((post,idx)=>{const frag=tpl.content.cloneNode(true); const root=frag.querySelector('.edit-post'); const name=root.querySelector('.post-name-input'); const text=root.querySelector('.post-text-input'); const time=root.querySelector('.post-time-input'); const avatarBtn=root.querySelector('.post-avatar-btn'); const avatarFile=root.querySelector('.post-avatar-file'); const imagesBtn=root.querySelector('.post-images-btn'); const imagesFile=root.querySelector('.post-images-file'); const imagesClear=root.querySelector('.post-images-clear'); const imagesCount=root.querySelector('.post-images-count'); const likesSwitch=root.querySelector('.post-likes-switch'); const likesWrap=root.querySelector('.post-likes-wrap'); const likesInput=root.querySelector('.post-likes-input'); const comments=root.querySelector('.post-comments'); const addComment=root.querySelector('.post-add-comment'); const del=root.querySelector('.post-delete'); name.value=post.name; text.value=post.text; time.value=post.time; imagesCount.textContent=`当前 ${post.images.length} 张图片`; likesSwitch.value=post.likes.length?'yes':'no'; likesWrap.style.display=post.likes.length?'block':'none'; likesInput.value=post.likes.join(', '); name.oninput=e=>{post.name=e.target.value; renderPreview();}; text.oninput=e=>{post.text=e.target.value; renderPreview();}; time.oninput=e=>{post.time=e.target.value; renderPreview();}; avatarBtn.onclick=()=>avatarFile.click(); avatarFile.onchange=async e=>{const f=e.target.files[0]; if(!f)return; post.avatar=await makeSquareAvatar(await readFile(f)); avatarFile.value=''; renderPreview();}; imagesBtn.onclick=()=>imagesFile.click(); imagesClear.onclick=()=>{post.images=[]; render();}; imagesFile.onchange=async e=>{const files=Array.from(e.target.files||[]).slice(0,9); if(!files.length)return; const sources=await Promise.all(files.map(readFile)); post.images=files.length>1?await Promise.all(sources.map(src=>makeSquareCover(src))):sources; imagesFile.value=''; render();}; likesSwitch.onchange=e=>{const on=e.target.value==='yes'; likesWrap.style.display=on?'block':'none'; if(!on){post.likes=[]; renderPreview(); return;} post.likes=likesInput.value.split(',').map(v=>v.trim()).filter(Boolean); renderPreview();}; likesInput.oninput=e=>{post.likes=e.target.value.split(',').map(v=>v.trim()).filter(Boolean); renderPreview();}; post.comments.forEach((_,i)=>comments.appendChild(commentRow(post,i))); addComment.onclick=()=>{post.comments.push({user:'评论人',content:'评论内容'}); render();}; del.onclick=()=>{posts.splice(idx,1); render();}; editorPosts.appendChild(root);});}
function render(){renderPreview(); renderEditor();}
async function initializeAvatars(){defaultAvatarThumb=await makeSquareAvatar(DEFAULT_AVATAR); posts=posts.map(post=>({...post,avatar:post.avatar===DEFAULT_AVATAR?defaultAvatarThumb:post.avatar})); setImg(myAvatarImg,defaultAvatarThumb); render();}
function waitImages(root){const imgs=Array.from(root.querySelectorAll('img')); if(!imgs.length)return Promise.resolve(); return Promise.all(imgs.map(async img=>{if(!img.complete){await new Promise(resolve=>{img.addEventListener('load',resolve,{once:true}); img.addEventListener('error',resolve,{once:true});});} if(typeof img.decode==='function'){try{await img.decode();}catch(error){}}}));}
async function takeScreenshot(){const phone=document.getElementById('phone'); const originalText=shotBtn.textContent; const originalDisabled=shotBtn.disabled; let clone=null; shotBtn.disabled=true; shotBtn.textContent='正在生成截图...'; try{await waitImages(phone); await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r))); clone=phone.cloneNode(true); clone.style.position='fixed'; clone.style.left='-10000px'; clone.style.top='0'; clone.style.height=`${phone.scrollHeight}px`; clone.style.overflow='visible'; clone.style.border='0'; clone.style.borderRadius='0'; clone.style.boxShadow='none'; clone.querySelectorAll('img').forEach(img=>{img.decoding='sync';}); const notch=clone.querySelector('.notch'); if(notch)notch.remove(); document.body.appendChild(clone); await waitImages(clone); await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r))); const width=Math.ceil(clone.scrollWidth||clone.getBoundingClientRect().width||phone.scrollWidth); const height=Math.ceil(clone.scrollHeight||clone.getBoundingClientRect().height||phone.scrollHeight); const canvas=await html2canvas(clone,{scale:SCALE,useCORS:true,allowTaint:true,backgroundColor:'#fff',width,height,windowWidth:width,windowHeight:height,scrollX:0,scrollY:0,imageTimeout:0,removeContainer:true,logging:false}); const link=document.createElement('a'); link.download=`moments_${Date.now()}.png`; link.href=canvas.toDataURL('image/png'); link.click();}catch(error){console.error('Screenshot failed:',error); alert(`截图生成失败：${error.message||'未知错误'}`);}finally{if(clone&&clone.parentNode)clone.parentNode.removeChild(clone); shotBtn.disabled=originalDisabled; shotBtn.textContent=originalText;}}
document.getElementById('my-name-input').addEventListener('input',e=>{document.getElementById('my-name-view').textContent=e.target.value;});
document.getElementById('my-avatar-file').addEventListener('change',async e=>{const f=e.target.files[0]; if(!f)return; defaultAvatarThumb=await makeSquareAvatar(await readFile(f)); setImg(myAvatarImg,defaultAvatarThumb); e.target.value='';});
document.getElementById('cover-file').addEventListener('change',async e=>{const f=e.target.files[0]; if(!f)return; setCover(await readFile(f)); e.target.value='';});
document.getElementById('add-post').addEventListener('click',()=>{posts.push({id:Date.now(),name:'新用户',avatar:defaultAvatarThumb||DEFAULT_AVATAR,text:'这是一条新的动态...',images:[],time:'刚刚',likes:[],comments:[]}); render();});
setCover(DEFAULT_COVER); initializeAvatars();
</script>
</body>
</html>
